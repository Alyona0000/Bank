<script>
let capital = 100000;
let totalCreditProfit = 0;
let totalDepositCosts = 0;
let totalStockProfit = 0;
let day = 1;

let generatedCode = "";
let isLoggedIn = false;

function update(){
    document.getElementById("capital").innerText =
        capital.toFixed(2) + " ₴";

    document.getElementById("creditProfitStat").innerText =
        totalCreditProfit.toFixed(2) + " ₴";

    document.getElementById("depositCostStat").innerText =
        totalDepositCosts.toFixed(2) + " ₴";

    document.getElementById("stockProfitStat").innerText =
        totalStockProfit.toFixed(2) + " ₴";

    document.getElementById("daysStat").innerText = day;
}

function applyServerData(data){
    capital = data.capital;
    totalCreditProfit = data.creditProfit;
    totalDepositCosts = data.depositCosts;
    totalStockProfit = data.securityProfit;
    day = data.day;

    update();
}

function log(text){
    let logBox = document.getElementById("log");
    logBox.innerText += "\n" + text;
    logBox.scrollTop = logBox.scrollHeight;
}

function checkLogin(){
    if(!isLoggedIn){
        log("🔒 Спочатку увійдіть у систему.");
        openLogin();
        return false;
    }
    return true;
}

function getInputAmount(){
    let value = parseFloat(document.getElementById("amountInput").value);

    if(isNaN(value) || value <= 0){
        return null;
    }

    return value;
}

async function sendRequest(url, body = ""){
    let response = await fetch(url, {
        method: "POST",
        body: body.toString()
    });

    let data = await response.json();
    applyServerData(data);
}

async function addDeposit(){
    if(!checkLogin()) return;

    let amount = getInputAmount();

    if(amount === null){
        log("❌ Введіть суму.");
        return;
    }

    await sendRequest("/api/deposit", amount);

    log("💰 Депозит відкрито на " + amount.toFixed(2) + " ₴");
}

async function giveCredit(){
    if(!checkLogin()) return;

    let amount = getInputAmount();

    if(amount === null){
        log("❌ Введіть суму.");
        return;
    }

    await sendRequest("/api/credit", amount);

    log("💳 Запит на кредит: " + amount.toFixed(2) + " ₴");
}

async function buyStock(){
    if(!checkLogin()) return;

    await sendRequest("/api/buy-stock");

    log("📈 Банк купив випадкову кількість акцій.");
}

async function sellStock(){
    if(!checkLogin()) return;

    await sendRequest("/api/sell-stock");

    log("📉 Банк продав випадкову кількість акцій.");
}

async function simulateDay(){
    if(!checkLogin()) return;

    await sendRequest("/api/simulate-day");

    log("🏦 Новий день змодельовано на сервері.");
}

function openLogin(){
    generatedCode =
        Math.floor(1000 + Math.random() * 9000).toString();

    alert("Verification code: " + generatedCode);

    document.getElementById("loginModal").style.display = "flex";
}

function closeLogin(){
    document.getElementById("loginModal").style.display = "none";
}

function registerUser(){
    let username = document.getElementById("loginName").value;
    let password = document.getElementById("loginPassword").value;
    let code = document.getElementById("verifyCode").value;

    if(username === "" || password === "" || code === ""){
        document.getElementById("loginStatus").innerText =
            "❌ Заповніть усі поля.";
        return;
    }

    if(code !== generatedCode){
        document.getElementById("loginStatus").innerText =
            "❌ Wrong verification code";
        return;
    }

    localStorage.setItem("bank_username", username);
    localStorage.setItem("bank_password", password);

    document.getElementById("loginStatus").innerText =
        "✅ Registration successful";

    log("📝 Новий користувач: " + username);
}

function loginUser(){
    let username = document.getElementById("loginName").value;
    let password = document.getElementById("loginPassword").value;

    let savedUser = localStorage.getItem("bank_username");
    let savedPassword = localStorage.getItem("bank_password");

    if(username === savedUser && password === savedPassword){
        isLoggedIn = true;

        document.getElementById("loginStatus").innerText =
            "✅ Login successful";

        log("🔐 Користувач увійшов: " + username);

        setTimeout(function(){
            closeLogin();
        }, 1000);
    } else {
        document.getElementById("loginStatus").innerText =
            "❌ Wrong username or password";
    }
}

function showSection(section){
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("formulaSection").style.display = "none";
    document.getElementById("depositSection").style.display = "none";
    document.getElementById("creditSection").style.display = "none";
    document.getElementById("stockSection").style.display = "none";

    if(section === "home"){
        document.getElementById("homeSection").style.display = "block";
        document.getElementById("formulaSection").style.display = "block";
    }

    if(section === "deposits"){
        document.getElementById("depositSection").style.display = "block";
        document.getElementById("formulaSection").style.display = "block";
    }

    if(section === "credits"){
        document.getElementById("creditSection").style.display = "block";
        document.getElementById("formulaSection").style.display = "block";
    }

    if(section === "stocks"){
        document.getElementById("stockSection").style.display = "block";
        document.getElementById("formulaSection").style.display = "block";
    }
}

function toggleAuthorInfo(){
    let panel = document.getElementById("authorPanel");
    panel.classList.toggle("active");
}

window.onclick = function(event){
    let modal = document.getElementById("loginModal");

    if(event.target === modal){
        closeLogin();
    }
}

update();
</script>
